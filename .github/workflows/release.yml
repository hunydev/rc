name: Release

on:
  release:
    types: [created]

permissions: {}

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$'; then
            echo "::error::Invalid tag format: $VERSION"
            exit 1
          fi

          BINARY="rc"
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
            BINARY="rc.exe"
          fi

          CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${VERSION}" -o "$BINARY" .

          ARCHIVE_BASE="rc_${VERSION}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            ARCHIVE="${ARCHIVE_BASE}.zip"
            zip "$ARCHIVE" "$BINARY"
          else
            ARCHIVE="${ARCHIVE_BASE}.tar.gz"
            tar czf "$ARCHIVE" "$BINARY"
          fi

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ env.ARCHIVE }}" --clobber
