<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11111b"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Terminal window chrome -->
  <rect x="300" y="120" width="600" height="390" rx="12" fill="#181825" stroke="#313244" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="300" y="120" width="600" height="40" rx="12" fill="#181825"/>
  <rect x="300" y="148" width="600" height="12" fill="#181825"/>
  <!-- Window dots -->
  <circle cx="324" cy="140" r="6" fill="#f38ba8" opacity="0.8"/>
  <circle cx="344" cy="140" r="6" fill="#f9e2af" opacity="0.8"/>
  <circle cx="364" cy="140" r="6" fill="#a6e3a1" opacity="0.8"/>
  <!-- Title bar text -->
  <text x="600" y="145" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-size="13" fill="#6c7086">rc — terminal</text>
  <!-- Terminal content lines -->
  <g font-family="'SF Mono','JetBrains Mono',monospace" font-size="14">
    <text x="328" y="190" fill="#a6e3a1">❯</text>
    <text x="348" y="190" fill="#cdd6f4">rc -c bash -c htop -p 8000</text>
    <text x="328" y="218" fill="#89b4fa">●</text>
    <text x="348" y="218" fill="#6c7086">rc running on http://0.0.0.0:8000/</text>
    <text x="328" y="258" fill="#a6e3a1">❯</text>
    <text x="348" y="258" fill="#cdd6f4">rc -a server:8000 -c bash</text>
    <text x="328" y="286" fill="#cba6f7">⬡</text>
    <text x="348" y="286" fill="#6c7086">agent attached to server:8000</text>
  </g>
  <!-- Cursor blink -->
  <rect x="328" y="310" width="8" height="16" rx="1" fill="#f5e0dc" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Logo small bottom-left of terminal -->
  <g transform="translate(540, 430) scale(0.22)">
    <path d="m225.2 75.26c0-14.2-11.54-25.74-25.74-25.74h-158.5c-14.21 0-26.32 11.9-26.32 25.74v157.2c0 13.84 11.9 25.38 26.11 25.38h158.5c13.63 0 25.95-12.11 25.95-25.38v-157.2zm-12.53 157.2c0 7.96-6.91 13.63-13.84 13.42h-157.8c-8.17 0-13.79-6.3-13.79-13.42v-157.2c0-7.96 6.09-13.84 14.05-13.84h157.6c7.96 0 13.84 6.3 13.84 13.84v157.2z" fill="#89b4fa"/>
    <path d="m52.62 103.8 42.14 99.77h16.4l-41.1-99.77h-17.44z" fill="#cdd6f4"/>
    <path d="m120 191.7h66.96v11.93h-66.96v-11.93z" fill="#cdd6f4"/>
  </g>
  <!-- "rc" next to logo -->
  <text x="600" y="500" text-anchor="middle" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="28" font-weight="600" fill="#cdd6f4">rc</text>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <!-- Subtle bottom text -->
  <text x="600" y="580" text-anchor="middle" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="15" fill="#45475a" letter-spacing="1">Terminal in your browser</text>
</svg>
