<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>rc</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1e1e2e; color: #cdd6f4; font-family: system-ui, sans-serif; overflow: hidden; }

    /* ───── Scrollbar (Catppuccin Mocha) ───── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e1e2e; }
    ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #585b70; }
    ::-webkit-scrollbar-corner { background: #1e1e2e; }
    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: #1e1e2e; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #585b70; }
    /* Firefox */
    .xterm-viewport { scrollbar-width: thin; scrollbar-color: #45475a #1e1e2e; }

    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #181825; border-bottom: 1px solid #313244;
      height: 40px; flex-shrink: 0; gap: 12px; overflow: hidden;
    }
    #header .title { font-size: 14px; font-weight: 600; color: #89b4fa; white-space: nowrap; }
    #header .info {
      font-size: 12px; color: #6c7086; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: center;
    }
    #header .info span { color: #a6adc8; }
    #header .status { font-size: 12px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .status-connected { background: #a6e3a1; color: #1e1e2e; }
    .status-disconnected { background: #f38ba8; color: #1e1e2e; }
    .status-connecting { background: #f9e2af; color: #1e1e2e; }

    #tab-bar {
      display: none; /* hidden when single tab */
      background: #181825; border-bottom: 1px solid #313244;
      padding: 0 12px; gap: 2px; overflow-x: auto; flex-shrink: 0;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    #tab-bar.visible { display: flex; }
    .tab-item {
      padding: 6px 16px; font-size: 13px; color: #6c7086; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      display: flex; align-items: center; gap: 6px;
      user-select: none; -webkit-user-select: none;
    }
    .tab-item:hover { color: #a6adc8; }
    .tab-item.active { color: #89b4fa; border-bottom-color: #89b4fa; }
    .tab-item .tab-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #40d080; flex-shrink: 0;
      transition: background 0.3s;
    }
    .tab-item .tab-dot.awaiting { background: #f0c040; animation: pulse-await 1.2s ease-in-out infinite; }
    @keyframes pulse-await {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    .tab-item .tab-dot.exited { background: #f38ba8; }
    .tab-item .tab-dot.disconnected { background: #585b70; }
    .tab-item.remote { font-style: italic; }
    .tab-item.remote.active { color: #cba6f7; border-bottom-color: #cba6f7; }
    .tab-item .tab-dot.remote-dot { box-shadow: 0 0 0 2px #181825, 0 0 0 3px #cba6f7; }
    .tab-badge {
      display: none;
    }
    .tab-close {
      display: none; margin-left: 6px; font-size: 15px; color: #6c7086;
      cursor: pointer; padding: 0 2px; line-height: 1; font-style: normal;
    }
    .tab-close:hover { color: #f38ba8; }
    .tab-split-btn {
      display: none; margin-left: 4px; font-size: 12px; color: #6c7086;
      cursor: pointer; padding: 0 2px; line-height: 1; font-style: normal;
    }
    .tab-split-btn:hover { color: #89b4fa; }
    .tab-item:hover .tab-split-btn { display: inline; }
    .tab-item.active .tab-split-btn { display: none; }
    .tab-item.dragging { opacity: 0.4; }
    .tab-item.drag-over { border-left: 2px solid #89b4fa; }

    #main-area { display: flex; flex: 1; min-height: 0; }
    #terminal-container { flex: 1; padding: 4px; position: relative; min-width: 0; }
    .term-wrapper { position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; display: none; }
    .term-wrapper.active { display: block; }

    #split-pane {
      display: none; flex-direction: column;
      width: 50%; border-left: 1px solid #313244;
      min-width: 0;
    }
    #split-pane.visible { display: flex; }
    .split-entry { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .split-entry + .split-entry { border-top: 1px solid #313244; }
    .split-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 10px; background: #181825; font-size: 12px; color: #a6adc8;
      flex-shrink: 0; height: 24px; border-bottom: 1px solid #313244;
    }
    .split-header .split-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .split-header .split-unsplit {
      display: none; cursor: pointer; font-size: 13px; color: #6c7086; padding: 0 2px;
    }
    .split-header .split-unsplit:hover { color: #f38ba8; }
    .split-header:hover .split-unsplit { display: inline; }
    .split-terminal { flex: 1; position: relative; padding: 4px; min-height: 0; }
    .split-terminal .term-wrapper { display: block; }

    /* Split pane toggle for narrow screens */
    #split-toggle {
      display: none; position: fixed; bottom: 76px; right: 20px; z-index: 89;
      width: 44px; height: 44px; border-radius: 50%;
      background: #313244; color: #bac2de; border: 1px solid #45475a;
      font-size: 18px; line-height: 1; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      align-items: center; justify-content: center;
      touch-action: manipulation;
      transition: background 0.15s, transform 0.15s;
    }
    #split-toggle:active { transform: scale(0.9); background: #45475a; }

    @media (max-width: 768px) {
      #split-pane.visible {
        display: flex;
        position: fixed; top: 0; right: 0; bottom: 0;
        width: 100%; z-index: 80;
        background: #1e1e2e;
        border-left: none;
        transform: translateX(100%);
        transition: transform 0.25s ease;
      }
      #split-pane.visible.slide-in { transform: translateX(0); }
      #split-toggle.visible { display: flex; }
    }
    #app { display: flex; flex-direction: column; height: 100%; }

    /* ───── Restart bar (bottom center, no modal) ───── */
    #restart-bar {
      display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 95;
    }
    #restart-bar.visible { display: block; }
    #restart-bar button {
      background: #89b4fa; color: #1e1e2e; border: none; border-radius: 8px;
      padding: 10px 28px; font-size: 14px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: background 0.15s, transform 0.1s;
    }
    #restart-bar button:hover { background: #74c7ec; }
    #restart-bar button:active { transform: scale(0.95); }

    /* ───── Disconnected overlay ───── */
    #dc-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    #dc-overlay.visible { display: flex; }
    #dc-overlay .message {
      background: #313244; padding: 24px 32px; border-radius: 12px;
      text-align: center; max-width: 320px;
    }
    #dc-overlay .message h3 { color: #f38ba8; margin-bottom: 8px; }
    #dc-overlay .message p { color: #a6adc8; font-size: 14px; margin-bottom: 16px; }
    #dc-overlay .message button {
      background: #89b4fa; color: #1e1e2e; border: none; border-radius: 6px;
      padding: 8px 24px; font-size: 14px; cursor: pointer;
    }
    #dc-overlay .message button:hover { background: #74c7ec; }

    /* ───── Floating Helper Button & Panel ───── */
    #helper-fab {
      display: none;
      position: fixed; bottom: 20px; right: 20px; z-index: 90;
      width: 44px; height: 44px; border-radius: 50%;
      background: #313244; color: #bac2de; border: 1px solid #45475a;
      font-size: 18px; line-height: 1; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      align-items: center; justify-content: center;
      touch-action: manipulation;
      transition: background 0.15s, transform 0.15s;
      padding: 0;
    }
    #helper-fab:active { transform: scale(0.9); background: #45475a; }

    #helper-panel {
      display: none;
      position: fixed; bottom: 76px; right: 12px; z-index: 91;
      background: #313244; border: 1px solid #45475a; border-radius: 12px;
      padding: 12px; width: 220px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #helper-panel.visible { display: block; }

    #helper-panel .section-title {
      font-size: 11px; color: #6c7086; text-transform: uppercase;
      margin: 8px 0 4px 0; letter-spacing: 0.5px;
    }
    #helper-panel .section-title:first-child { margin-top: 0; }

    #helper-panel .key-row {
      display: flex; gap: 4px; margin-bottom: 4px; flex-wrap: wrap;
    }
    #helper-panel button.key-btn {
      background: #45475a; color: #cdd6f4; border: none; border-radius: 6px;
      padding: 10px 0; font-size: 14px; font-family: monospace;
      cursor: pointer; touch-action: manipulation;
      flex: 1; min-width: 44px; text-align: center;
      transition: background 0.1s;
    }
    #helper-panel button.key-btn:active { background: #585b70; }
    #helper-panel button.key-btn.active { background: #89b4fa; color: #1e1e2e; }
    #helper-panel button.key-btn.wide { flex: 2; }

    @media (max-width: 768px) {
      #helper-fab { display: flex; }
      #header .info { font-size: 11px; }
    }
    @media (hover: none) and (pointer: coarse) {
      #helper-fab { display: flex; }
    }

    /* ───── Login Overlay ───── */
    #login-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #1e1e2e; z-index: 9999;
      justify-content: center; align-items: center;
    }
    #login-overlay.visible { display: flex; }
    .login-box {
      background: #181825; padding: 32px; border-radius: 12px;
      border: 1px solid #313244; text-align: center;
      width: 320px; max-width: 90vw;
    }
    .login-box h3 { color: #89b4fa; margin: 8px 0 4px; font-size: 20px; }
    .login-box p { color: #6c7086; font-size: 13px; margin-bottom: 16px; }
    .login-box input[type="password"] {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid #313244; background: #1e1e2e; color: #cdd6f4;
      font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .login-box input[type="password"]:focus { border-color: #89b4fa; }
    .login-box .login-submit {
      width: 100%; padding: 10px; border-radius: 8px;
      border: none; background: #89b4fa; color: #1e1e2e;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .login-box .login-submit:hover { background: #74c7ec; }
    #login-error { display: none; color: #f38ba8; font-size: 12px; margin-top: 8px; }

    /* ───── Upload ───── */
    #upload-btn {
      display: none; background: none; border: 1px solid #45475a; border-radius: 6px;
      color: #bac2de; padding: 2px 8px; font-size: 12px; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; line-height: 1;
      transition: background 0.15s, border-color 0.15s;
    }
    #upload-btn:hover { background: #313244; border-color: #585b70; }
    #upload-btn.visible { display: inline-flex; align-items: center; gap: 4px; }

    #upload-modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      justify-content: center; align-items: center;
    }
    #upload-modal.visible { display: flex; }
    .upload-box {
      background: #181825; padding: 24px 28px; border-radius: 12px;
      border: 1px solid #313244; width: 380px; max-width: 90vw;
    }
    .upload-box h3 { color: #89b4fa; margin: 0 0 16px; font-size: 16px; }
    .upload-box .upload-drop {
      border: 2px dashed #45475a; border-radius: 8px; padding: 24px;
      text-align: center; color: #6c7086; font-size: 13px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; margin-bottom: 12px;
    }
    .upload-box .upload-drop:hover { border-color: #89b4fa; background: rgba(137,180,250,0.05); }
    .upload-box .upload-drop.dragover { border-color: #89b4fa; background: rgba(137,180,250,0.1); }
    .upload-box .upload-progress {
      display: none; margin-bottom: 12px;
    }
    .upload-box .upload-progress .bar-bg {
      height: 6px; background: #313244; border-radius: 3px; overflow: hidden;
    }
    .upload-box .upload-progress .bar-fill {
      height: 100%; background: #89b4fa; border-radius: 3px;
      width: 0%; transition: width 0.2s;
    }
    .upload-box .upload-progress .bar-label {
      font-size: 12px; color: #a6adc8; margin-top: 4px; text-align: center;
    }
    .upload-box .upload-result {
      display: none; font-size: 13px; padding: 12px; border-radius: 8px;
      margin-bottom: 12px; word-break: break-all;
    }
    .upload-box .upload-result.success { background: rgba(166,227,161,0.1); color: #a6e3a1; }
    .upload-box .upload-result.error { background: rgba(243,139,168,0.1); color: #f38ba8; }
    .upload-box .upload-close {
      width: 100%; padding: 8px; border-radius: 8px;
      border: 1px solid #45475a; background: #313244; color: #cdd6f4;
      font-size: 13px; cursor: pointer;
    }
    .upload-box .upload-close:hover { background: #45475a; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <img src="logo.svg" alt="rc" style="height:18px;width:18px;margin-right:6px;vertical-align:middle;">
      <span class="title">rc</span>
      <span class="info" id="header-info"></span>
      <button id="upload-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload</button>
      <span id="status" class="status status-connecting">connecting...</span>
    </div>
    <div id="tab-bar"></div>
    <div id="main-area">
      <div id="terminal-container"></div>
      <div id="split-pane"></div>
    </div>
  </div>
  <button id="split-toggle" aria-label="Toggle split pane"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg></button>

  <!-- Restart button (inline, bottom center) -->
  <div id="restart-bar">
    <button id="restart-btn">↻ Restart</button>
  </div>

  <!-- Disconnected Overlay (reconnect) -->
  <div id="dc-overlay">
    <div class="message">
      <h3>Disconnected</h3>
      <p>The connection was lost. The process may still be running.</p>
      <button onclick="connectWS()">Reconnect</button>
    </div>
  </div>

  <!-- Login Overlay -->
  <div id="login-overlay">
    <div class="login-box">
      <img src="logo.svg" alt="rc" style="height:32px;width:32px;margin-bottom:8px;">
      <h3>rc</h3>
      <p>Enter password to continue</p>
      <input type="password" id="login-password" placeholder="Password">
      <button class="login-submit" id="login-btn">Login</button>
      <p id="login-error">Invalid password</p>
    </div>
  </div>

  <!-- Upload Modal -->
  <div id="upload-modal">
    <div class="upload-box">
      <h3>Upload File</h3>
      <div class="upload-drop" id="upload-drop">
        Click to select a file or drag &amp; drop here
        <input type="file" id="upload-file" style="display:none">
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="bar-bg"><div class="bar-fill" id="upload-bar"></div></div>
        <div class="bar-label" id="upload-label">Uploading...</div>
      </div>
      <div class="upload-result" id="upload-result"></div>
      <button class="upload-close" id="upload-close">Close</button>
    </div>
  </div>

  <!-- Floating Helper Button (mobile) -->
  <button id="helper-fab" aria-label="Helper keyboard"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="6" y2="12"/><line x1="10" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="14" y2="12"/><line x1="18" y1="12" x2="18" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/></svg></button>

  <!-- Helper Key Panel -->
  <div id="helper-panel">
    <div class="section-title">Arrow Keys</div>
    <div class="key-row">
      <button class="key-btn" data-key="left">&#8592;</button>
      <button class="key-btn" data-key="up">&#8593;</button>
      <button class="key-btn" data-key="down">&#8595;</button>
      <button class="key-btn" data-key="right">&#8594;</button>
    </div>
    <div class="section-title">Special Keys</div>
    <div class="key-row">
      <button class="key-btn wide" data-key="tab">Tab</button>
      <button class="key-btn wide" data-key="esc">Esc</button>
    </div>
    <div class="key-row">
      <button class="key-btn wide" data-key="enter">Enter</button>
      <button class="key-btn wide" data-key="space">Space</button>
    </div>
    <div class="section-title">Control</div>
    <div class="key-row">
      <button class="key-btn wide" data-key="ctrlc">Ctrl+C</button>
      <button class="key-btn wide" id="ctrl-toggle">Ctrl &#9166;</button>
    </div>
    <div class="key-row">
      <button class="key-btn wide" id="paste-btn" style="flex:1">&#128203; Paste</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const headerInfo = document.getElementById('header-info');
    const tabBar = document.getElementById('tab-bar');
    const termContainer = document.getElementById('terminal-container');
    const splitPane = document.getElementById('split-pane');
    const splitToggle = document.getElementById('split-toggle');
    const restartBar = document.getElementById('restart-bar');
    const restartBtn = document.getElementById('restart-btn');
    const dcOverlay = document.getElementById('dc-overlay');
    const helperFab = document.getElementById('helper-fab');
    const helperPanel = document.getElementById('helper-panel');
    const ctrlToggle = document.getElementById('ctrl-toggle');
    const pasteBtn = document.getElementById('paste-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const uploadModal = document.getElementById('upload-modal');
    const uploadDrop = document.getElementById('upload-drop');
    const uploadFile = document.getElementById('upload-file');
    const uploadProgress = document.getElementById('upload-progress');
    const uploadBar = document.getElementById('upload-bar');
    const uploadLabel = document.getElementById('upload-label');
    const uploadResult = document.getElementById('upload-result');
    const uploadClose = document.getElementById('upload-close');

    // ───── Multi-Tab State ─────
    let tabs = [];       // [{name, term, fitAddon, wrapper, status, dotEl, meta, split, ...}]
    let activeTab = 0;
    let ws = null;
    let reconnectTimer = null;
    let ctrlActive = false;
    let tabsInitialized = false;
    let hubInfo = {}; // {hostname, workspace} from /info
    // Derive route prefix from current URL path (strip trailing /index.html or /)
    const routePrefix = location.pathname.replace(/\/(?:index\.html)?$/, '');

    function isConnected() { return ws && ws.readyState === WebSocket.OPEN; }
    function getActiveTab() {
      const t = tabs[activeTab];
      return (t && !t.removed) ? t : null;
    }
    let splitTabs = []; // indices of tabs in split pane (display order)
    let dragSrcIdx = null; // currently dragged tab index

    const termOptions = {
      cursorBlink: true,
      fontSize: 14,
      fontFamily: "'Cascadia Code', 'Fira Code', 'JetBrains Mono', Menlo, monospace",
      theme: {
        background: '#1e1e2e', foreground: '#cdd6f4', cursor: '#f5e0dc',
        selectionBackground: '#585b70',
        black: '#45475a', red: '#f38ba8', green: '#a6e3a1', yellow: '#f9e2af',
        blue: '#89b4fa', magenta: '#cba6f7', cyan: '#94e2d5', white: '#bac2de',
        brightBlack: '#585b70', brightRed: '#f38ba8', brightGreen: '#a6e3a1',
        brightYellow: '#f9e2af', brightBlue: '#89b4fa', brightMagenta: '#cba6f7',
        brightCyan: '#94e2d5', brightWhite: '#a6adc8',
      },
      allowProposedApi: true,
      scrollback: 50000,
    };

    function ensureTab(idx, name, remote, meta) {
      if (tabs[idx]) return; // Already exists
      meta = meta || {};

      // Fill gaps if needed
      while (tabs.length < idx) tabs.push(null);

      // Terminal wrapper
      const isFirst = tabs.filter(Boolean).length === 0;
      const wrapper = document.createElement('div');
      wrapper.className = 'term-wrapper' + (isFirst ? ' active' : '');
      termContainer.appendChild(wrapper);

      // Terminal instance
      const t = new window.Terminal(termOptions);
      const fit = new window.FitAddon.FitAddon();
      const links = new window.WebLinksAddon.WebLinksAddon();
      t.loadAddon(fit);
      t.loadAddon(links);
      t.open(wrapper);
      if (isFirst || idx === activeTab) fit.fit();

      // Copy on selection
      t.onSelectionChange(() => {
        const sel = t.getSelection();
        if (sel && navigator.clipboard) {
          navigator.clipboard.writeText(sel).catch(() => {});
        }
      });

      // Tab bar item
      const tabEl = document.createElement('div');
      tabEl.className = 'tab-item' + (isFirst ? ' active' : '') + (remote ? ' remote' : '');
      tabEl.draggable = true;
      tabEl.dataset.tabIdx = idx;

      // Drag-and-drop
      tabEl.addEventListener('dragstart', (e) => {
        dragSrcIdx = idx;
        tabEl.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      tabEl.addEventListener('dragend', () => {
        tabEl.classList.remove('dragging');
        dragSrcIdx = null;
        tabBar.querySelectorAll('.tab-item').forEach(el => el.classList.remove('drag-over'));
        saveTabOrder();
      });
      tabEl.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (dragSrcIdx !== null && dragSrcIdx !== idx) tabEl.classList.add('drag-over');
      });
      tabEl.addEventListener('dragleave', () => tabEl.classList.remove('drag-over'));
      tabEl.addEventListener('drop', (e) => {
        e.preventDefault();
        tabEl.classList.remove('drag-over');
        if (dragSrcIdx === null || dragSrcIdx === idx) return;
        const srcTab = tabs[dragSrcIdx];
        if (!srcTab) return;
        // Move srcTab's tabEl before this tabEl
        tabBar.insertBefore(srcTab.tabEl, tabEl);
        saveTabOrder();
      });

      // Tooltip
      const tooltipParts = [];
      if (remote && meta.user && meta.addr) {
        tooltipParts.push(meta.user + '@' + meta.addr);
      } else if (meta.user) {
        tooltipParts.push(meta.user);
      }
      if (meta.pid) tooltipParts.push('pid: ' + meta.pid);
      if (tooltipParts.length) tabEl.title = tooltipParts.join(', ');
      const dot = document.createElement('span');
      dot.className = 'tab-dot';
      let closeEl = null;

      // Split-to-right button (shown on hover for non-active tabs)
      const splitBtn = document.createElement('span');
      splitBtn.className = 'tab-split-btn';
      splitBtn.textContent = '⧉';
      splitBtn.title = 'Split to right';
      splitBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        splitToRight(idx);
      });

      if (remote) {
        dot.classList.add('remote-dot');
        closeEl = document.createElement('span');
        closeEl.className = 'tab-close';
        closeEl.textContent = '×';
        closeEl.addEventListener('click', (e) => {
          e.stopPropagation();
          sendWS({ type: 'close_tab', tab: idx });
        });
        tabEl.appendChild(dot);
        const label = document.createElement('span');
        label.textContent = name;
        tabEl.appendChild(label);
        tabEl.appendChild(splitBtn);
        tabEl.appendChild(closeEl);
      } else {
        const label = document.createElement('span');
        label.textContent = name;
        tabEl.appendChild(dot);
        tabEl.appendChild(label);
        tabEl.appendChild(splitBtn);
      }
      tabEl.addEventListener('click', () => switchTab(idx));
      tabBar.appendChild(tabEl);

      // Wire up terminal I/O
      t.onData((data) => {
        if (!isConnected()) return;
        if (meta.readonly) return;
        if (ctrlActive && data.length === 1) {
          const code = data.toLowerCase().charCodeAt(0);
          if (code >= 97 && code <= 122) {
            sendWS({ type: 'input', data: String.fromCharCode(code - 96), tab: idx });
            deactivateCtrl();
            return;
          }
        }
        sendWS({ type: 'input', data, tab: idx });
      });

      t.onResize(({ cols, rows }) => {
        if (idx === activeTab || tabs[idx]?.split) {
          sendWS({ type: 'resize', cols, rows, tab: idx });
        }
      });

      tabs[idx] = { name, remote: !!remote, term: t, fitAddon: fit, wrapper, status: 'running', dotEl: dot, tabEl, closeEl, splitBtn, meta, split: false, splitEntry: null, lastOutputAt: Date.now() };

      // Show tab bar when more than 1 tab
      if (tabs.filter(Boolean).length > 1) tabBar.classList.add('visible');

      if (isFirst) {
        activeTab = idx;
        t.focus();
      }
    }

    function initTabs(tabInfos) {
      tabInfos.forEach((info, i) => {
        const name = typeof info === 'string' ? info : info.name;
        const remote = typeof info === 'object' && info.remote;
        const removed = typeof info === 'object' && info.removed;
        if (removed) {
          while (tabs.length <= i) tabs.push(null);
          return;
        }
        const meta = typeof info === 'object' ? info : {};
        ensureTab(i, name, remote, meta);
      });
      loadTabOrder();
      loadSplitState();
    }

    // ───── Tab Order (drag-and-drop persistence) ─────
    function saveTabOrder() {
      const order = [];
      tabBar.querySelectorAll('.tab-item').forEach(el => {
        order.push(parseInt(el.dataset.tabIdx));
      });
      try { localStorage.setItem('rc-tab-order', JSON.stringify(order)); } catch (e) {}
    }
    function loadTabOrder() {
      try {
        const saved = JSON.parse(localStorage.getItem('rc-tab-order'));
        if (!Array.isArray(saved)) return;
        // Reorder tab bar DOM to match saved order (only for indices that exist)
        const existing = new Set();
        tabBar.querySelectorAll('.tab-item').forEach(el => existing.add(parseInt(el.dataset.tabIdx)));
        saved.forEach(idx => {
          if (existing.has(idx) && tabs[idx]) {
            tabBar.appendChild(tabs[idx].tabEl);
          }
        });
      } catch (e) {}
    }

    // ───── Split State Persistence ─────
    function saveSplitState() {
      try { localStorage.setItem('rc-split-tabs', JSON.stringify(splitTabs)); } catch (e) {}
    }
    function loadSplitState() {
      try {
        const saved = JSON.parse(localStorage.getItem('rc-split-tabs'));
        if (!Array.isArray(saved)) return;
        saved.forEach(idx => {
          if (tabs[idx] && !tabs[idx].split && !tabs[idx].removed) {
            splitToRight(idx);
          }
        });
      } catch (e) {}
    }

    // ───── Split Pane ─────
    function updateSplitToggle() {
      if (splitTabs.length > 0) {
        splitToggle.classList.add('visible');
      } else {
        splitToggle.classList.remove('visible');
        splitPane.classList.remove('slide-in');
      }
    }

    splitToggle.addEventListener('click', () => {
      splitPane.classList.toggle('slide-in');
      // Refit after slide animation
      setTimeout(() => refitAllTerminals(), 300);
    });

    function splitToRight(idx) {
      const t = tabs[idx];
      if (!t || t.split) return;

      // If splitting the active tab, switch to another tab first
      if (idx === activeTab) {
        const other = tabs.findIndex((tab, i) => tab && !tab.split && !tab.removed && i !== idx);
        if (other === -1) return; // can't split the only tab
        switchTab(other);
      }

      t.split = true;
      splitTabs.push(idx);

      // Hide from tab bar
      t.tabEl.style.display = 'none';

      // Create split entry
      const entry = document.createElement('div');
      entry.className = 'split-entry';

      const header = document.createElement('div');
      header.className = 'split-header';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'split-name';
      nameSpan.textContent = t.name;
      const unsplitBtn = document.createElement('span');
      unsplitBtn.className = 'split-unsplit';
      unsplitBtn.textContent = '✕';
      unsplitBtn.title = 'Unsplit';
      unsplitBtn.addEventListener('click', () => unsplitTab(idx));
      header.appendChild(nameSpan);
      header.appendChild(unsplitBtn);

      const termArea = document.createElement('div');
      termArea.className = 'split-terminal';

      // Move wrapper from main container to split entry
      t.wrapper.classList.remove('active');
      t.wrapper.style.display = '';
      termArea.appendChild(t.wrapper);
      t.wrapper.classList.add('active');

      entry.appendChild(header);
      entry.appendChild(termArea);
      splitPane.appendChild(entry);
      t.splitEntry = entry;

      splitPane.classList.add('visible');
      updateSplitToggle();
      saveSplitState();
      refitAllTerminals();
    }

    function unsplitTab(idx) {
      const t = tabs[idx];
      if (!t || !t.split) return;

      t.split = false;
      splitTabs = splitTabs.filter(i => i !== idx);

      // Move wrapper back to main container
      t.wrapper.classList.remove('active');
      termContainer.appendChild(t.wrapper);

      // Remove split entry
      if (t.splitEntry) {
        t.splitEntry.remove();
        t.splitEntry = null;
      }

      // Show in tab bar again
      t.tabEl.style.display = '';

      // Hide split pane if empty
      if (splitTabs.length === 0) {
        splitPane.classList.remove('visible');
        splitPane.classList.remove('slide-in');
      }

      updateSplitToggle();
      saveSplitState();
      refitAllTerminals();
    }

    function refitAllTerminals() {
      // Refit active main tab
      const act = getActiveTab();
      if (act && !act.split) {
        setTimeout(() => {
          act.fitAddon.fit();
          sendWS({ type: 'resize', cols: act.term.cols, rows: act.term.rows, tab: activeTab });
        }, 50);
      }
      // Refit all split tabs
      splitTabs.forEach(idx => {
        const t = tabs[idx];
        if (t) {
          setTimeout(() => {
            t.fitAddon.fit();
            sendWS({ type: 'resize', cols: t.term.cols, rows: t.term.rows, tab: idx });
          }, 50);
        }
      });
    }

    function switchTab(idx) {
      if (!isConnected()) return;
      if (idx === activeTab || !tabs[idx] || tabs[idx].removed || tabs[idx].split) return;
      if (tabs[activeTab]) {
        tabs[activeTab].wrapper.classList.remove('active');
        tabs[activeTab].tabEl.classList.remove('active');
      }
      activeTab = idx;
      tabs[idx].wrapper.classList.add('active');
      tabs[idx].tabEl.classList.add('active');
      tabs[idx].fitAddon.fit();
      tabs[idx].term.focus();
      updateTabStatus();
      updateHeaderForTab();
      sendWS({ type: 'resize', cols: tabs[idx].term.cols, rows: tabs[idx].term.rows, tab: idx });
    }

    function updateTabStatus() {
      const t = getActiveTab();
      if (!t) return;
      if (t.status === 'exited') {
        setStatus('process exited', 'status-disconnected');
        const canRestart = !(t.meta && t.meta.noRestart);
        if (canRestart) {
          restartBar.classList.add('visible');
        } else {
          restartBar.classList.remove('visible');
        }
      } else if (t.status === 'disconnected') {
        setStatus('agent disconnected', 'status-disconnected');
        restartBar.classList.remove('visible');
      } else {
        setStatus('connected', 'status-connected');
        restartBar.classList.remove('visible');
      }
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = 'status ' + cls;
    }

    function sendWS(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      }
    }

    // ───── Auth & Header Info ─────
    let authToken = sessionStorage.getItem('rc-token') || '';
    let authRequired = false;

    function authHeaders() {
      return authToken ? { 'Authorization': 'Bearer ' + authToken } : {};
    }

    async function loadHeaderFromInfo(res) {
      try {
        const info = await res.json();
        hubInfo = info;
        updateHeaderForTab();
        if (info.upload) uploadBtn.classList.add('visible');
      } catch (e) {
        headerInfo.textContent = '';
      }
    }

    function updateHeaderForTab() {
      const t = getActiveTab();
      let hostname, workspace;
      if (t && t.meta && t.remote) {
        hostname = t.meta.hostname || '';
        workspace = t.meta.workspace || '';
      } else {
        hostname = hubInfo.hostname || '';
        workspace = hubInfo.workspace || '';
      }
      headerInfo.textContent = '';
      if (hostname) {
        const span = document.createElement('span');
        span.textContent = hostname;
        headerInfo.appendChild(span);
      }
      if (hostname && workspace) {
        headerInfo.appendChild(document.createTextNode(' \u00B7 '));
      }
      if (workspace) {
        headerInfo.appendChild(document.createTextNode(workspace));
      }
    }

    async function initApp() {
      let res;
      try { res = await fetch(routePrefix + '/info'); } catch (e) { connectWS(); return; }
      if (res.ok) {
        await loadHeaderFromInfo(res);
        connectWS();
        return;
      }
      if (res.status === 401) {
        authRequired = true;
        if (authToken) {
          try { res = await fetch(routePrefix + '/info', { headers: authHeaders() }); } catch (e) { connectWS(); return; }
          if (res.ok) {
            await loadHeaderFromInfo(res);
            connectWS();
            return;
          }
          authToken = '';
          sessionStorage.removeItem('rc-token');
        }
        document.getElementById('login-overlay').classList.add('visible');
        document.getElementById('login-password').focus();
      }
    }

    async function doLogin() {
      const pwd = document.getElementById('login-password').value;
      if (!pwd) return;
      try {
        const res = await fetch(routePrefix + '/info', { headers: { 'Authorization': 'Bearer ' + pwd } });
        if (res.ok) {
          authToken = pwd;
          authRequired = true;
          sessionStorage.setItem('rc-token', authToken);
          await loadHeaderFromInfo(res);
          document.getElementById('login-overlay').classList.remove('visible');
          connectWS();
        } else {
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-password').value = '';
          document.getElementById('login-password').focus();
        }
      } catch (e) {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    // ───── Resize ─────
    window.addEventListener('resize', () => {
      tabs.forEach((t, i) => {
        if ((i === activeTab && !t.split) || t.split) t.fitAddon.fit();
      });
      // On wide screens, auto-dismiss the slide-in class (it's only for narrow)
      if (window.innerWidth > 768 && splitPane.classList.contains('slide-in')) {
        splitPane.classList.remove('slide-in');
      }
    });

    // ───── Restart Button ─────
    restartBtn.addEventListener('click', () => {
      sendWS({ type: 'restart', tab: activeTab });
      restartBar.classList.remove('visible');
    });

    // ───── Floating Helper ─────
    const keyMap = {
      left:  '\x1b[D', up:    '\x1b[A', down:  '\x1b[B', right: '\x1b[C',
      tab:   '\t',     esc:   '\x1b',   enter: '\r',     space: ' ',
      ctrlc: '\x03',
    };

    // Prevent touchstart on FAB and panel to stop mobile browsers
    // from focusing the terminal textarea (which opens the virtual keyboard).
    // Also explicitly blur the terminal so an already-open keyboard is dismissed.
    function blurTerminal() {
      if (document.activeElement) document.activeElement.blur();
    }
    helperFab.addEventListener('touchstart', (e) => { e.preventDefault(); blurTerminal(); }, { passive: false });
    helperPanel.addEventListener('touchstart', (e) => { e.preventDefault(); blurTerminal(); }, { passive: false });

    let fabTouched = false;
    helperFab.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      fabTouched = true;
      helperPanel.classList.toggle('visible');
    }, { passive: false });
    helperFab.addEventListener('click', (e) => {
      if (fabTouched) { fabTouched = false; return; }
      e.stopPropagation();
      helperPanel.classList.toggle('visible');
    });

    document.addEventListener('touchstart', (e) => {
      if (!helperPanel.contains(e.target) && e.target !== helperFab) {
        helperPanel.classList.remove('visible');
      }
    });
    document.addEventListener('click', (e) => {
      if (!helperPanel.contains(e.target) && e.target !== helperFab) {
        helperPanel.classList.remove('visible');
      }
    });

    function sendKey(keyId) {
      if (!isConnected()) return;
      const t = getActiveTab();
      if (!t || (t.meta && t.meta.readonly)) return;
      const seq = keyMap[keyId];
      if (seq) sendWS({ type: 'input', data: seq, tab: activeTab });
    }

    helperPanel.querySelectorAll('button.key-btn[data-key]').forEach(btn => {
      let touched = false;
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        e.stopPropagation();
        touched = true;
        btn.style.background = '#585b70';
        setTimeout(() => btn.style.background = '', 120);
        sendKey(btn.getAttribute('data-key'));
      }, { passive: false });
      btn.addEventListener('click', (e) => {
        if (touched) { touched = false; return; }
        e.preventDefault();
        e.stopPropagation();
        sendKey(btn.getAttribute('data-key'));
      });
    });

    function deactivateCtrl() {
      ctrlActive = false;
      ctrlToggle.classList.remove('active');
      ctrlToggle.textContent = 'Ctrl \u23CE';
    }

    let ctrlTouched = false;
    function activateOrDeactivateCtrl() {
      ctrlActive = !ctrlActive;
      if (ctrlActive) {
        ctrlToggle.classList.add('active');
        ctrlToggle.textContent = 'Ctrl \u2713';
      } else {
        deactivateCtrl();
      }
    }
    ctrlToggle.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      ctrlTouched = true;
      activateOrDeactivateCtrl();
    }, { passive: false });
    ctrlToggle.addEventListener('click', (e) => {
      if (ctrlTouched) { ctrlTouched = false; return; }
      e.preventDefault();
      e.stopPropagation();
      activateOrDeactivateCtrl();
    });

    // Paste button handler
    let pasteTouched = false;
    pasteBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      pasteTouched = true;
      doPaste();
    }, { passive: false });
    pasteBtn.addEventListener('click', (e) => {
      if (pasteTouched) { pasteTouched = false; return; }
      e.preventDefault();
      e.stopPropagation();
      doPaste();
    });
    function doPaste() {
      if (!isConnected()) return;
      if (!navigator.clipboard || !navigator.clipboard.readText) return;
      const t = getActiveTab();
      if (!t || (t.meta && t.meta.readonly)) return;
      navigator.clipboard.readText().then(text => {
        if (text) sendWS({ type: 'input', data: text, tab: activeTab });
      }).catch(() => {});
    }

    // ───── Upload ─────
    function resetUploadModal() {
      uploadDrop.style.display = '';
      uploadProgress.style.display = 'none';
      uploadResult.style.display = 'none';
      uploadResult.className = 'upload-result';
      uploadResult.textContent = '';
      uploadBar.style.width = '0%';
      uploadLabel.textContent = 'Uploading...';
      uploadFile.value = '';
    }

    uploadBtn.addEventListener('click', () => {
      resetUploadModal();
      uploadModal.classList.add('visible');
    });

    uploadClose.addEventListener('click', () => {
      uploadModal.classList.remove('visible');
    });

    uploadModal.addEventListener('click', (e) => {
      if (e.target === uploadModal) uploadModal.classList.remove('visible');
    });

    uploadDrop.addEventListener('click', () => uploadFile.click());
    uploadDrop.addEventListener('dragover', (e) => { e.preventDefault(); uploadDrop.classList.add('dragover'); });
    uploadDrop.addEventListener('dragleave', () => uploadDrop.classList.remove('dragover'));
    uploadDrop.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadDrop.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) doUpload(e.dataTransfer.files[0]);
    });
    uploadFile.addEventListener('change', () => {
      if (uploadFile.files.length > 0) doUpload(uploadFile.files[0]);
    });

    function doUpload(file) {
      uploadDrop.style.display = 'none';
      uploadProgress.style.display = 'block';
      uploadLabel.textContent = 'Uploading ' + file.name + '...';

      const form = new FormData();
      form.append('file', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', routePrefix + '/upload');
      if (authToken) xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          uploadBar.style.width = pct + '%';
          uploadLabel.textContent = 'Uploading ' + file.name + '... ' + pct + '%';
        }
      });

      xhr.onload = () => {
        uploadProgress.style.display = 'none';
        uploadResult.style.display = 'block';
        try {
          const data = JSON.parse(xhr.responseText);
          if (xhr.status === 200) {
            uploadResult.className = 'upload-result success';
            uploadResult.textContent = '✓ Uploaded to ' + data.path;
          } else {
            uploadResult.className = 'upload-result error';
            uploadResult.textContent = '✗ ' + (data.error || 'Upload failed');
          }
        } catch (e) {
          uploadResult.className = 'upload-result error';
          uploadResult.textContent = '✗ Upload failed (status ' + xhr.status + ')';
        }
      };

      xhr.onerror = () => {
        uploadProgress.style.display = 'none';
        uploadResult.style.display = 'block';
        uploadResult.className = 'upload-result error';
        uploadResult.textContent = '✗ Network error';
      };

      xhr.send(form);
    }

    // ───── WebSocket ─────
    function connectWS() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        return;
      }

      setStatus('connecting...', 'status-connecting');
      dcOverlay.classList.remove('visible');
      restartBar.classList.remove('visible');

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsProtocols = authRequired && authToken ? [`auth-${authToken}`] : [];
      ws = new WebSocket(`${proto}//${location.host}${routePrefix}/ws`, wsProtocols);

      ws.onopen = () => {
        setStatus('connected', 'status-connected');
        // Send resize for active tab
        const act = getActiveTab();
        if (act) {
          sendWS({ type: 'resize', cols: act.term.cols, rows: act.term.rows, tab: activeTab });
        }
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          switch (msg.type) {
            case 'tabs':
              initTabs(msg.tabs || []);
              break;
            case 'tab_added':
              ensureTab(msg.tab, msg.data, msg.remote, msg.meta || {});
              break;
            case 'output': {
              const t = tabs[msg.tab];
              if (t) {
                t.term.write(msg.data);
                t.lastOutputAt = Date.now();
                t.dotEl.classList.remove('awaiting');
              }
              break;
            }
            case 'status': {
              const t = tabs[msg.tab];
              if (t) {
                t.status = msg.data;
                if (msg.data === 'exited' || msg.data === 'disconnected') {
                  t.dotEl.classList.remove('awaiting');
                  t.dotEl.classList.add(msg.data === 'disconnected' ? 'disconnected' : 'exited');
                  t.dotEl.classList.remove(msg.data === 'disconnected' ? 'exited' : 'disconnected');
                  if (msg.data === 'disconnected') {
                    t.term.write('\r\n\x1b[1;33m[rc] Agent disconnected.\x1b[0m\r\n');
                    if (t.closeEl) t.closeEl.style.display = 'inline';
                  }
                } else if (msg.data === 'restarted' || msg.data === 'running') {
                  t.status = 'running';
                  t.lastOutputAt = Date.now();
                  t.dotEl.classList.remove('exited', 'disconnected', 'awaiting');
                  if (t.closeEl) t.closeEl.style.display = 'none';
                  if (msg.data === 'restarted') {
                    t.term.clear();
                    t.term.reset();
                    setTimeout(() => {
                      t.fitAddon.fit();
                      sendWS({ type: 'resize', cols: t.term.cols, rows: t.term.rows, tab: msg.tab });
                    }, 50);
                  }
                }
                if (msg.tab === activeTab) updateTabStatus();
              }
              break;
            }
            case 'tab_removed': {
              const t = tabs[msg.tab];
              if (t) {
                if (t.split) unsplitTab(msg.tab);
                t.removed = true;
                t.tabEl.style.display = 'none';
                t.wrapper.style.display = 'none';
                if (t.term) t.term.dispose();
                if (msg.tab === activeTab) {
                  const nextIdx = tabs.findIndex((tt, i) => tt && !tt.removed && !tt.split);
                  if (nextIdx >= 0) switchTab(nextIdx);
                }
                const visibleCount = tabs.filter(tt => tt && !tt.removed).length;
                if (visibleCount <= 1) tabBar.classList.remove('visible');
              }
              break;
            }
            case 'error': {
              const t = tabs[msg.tab];
              if (t) t.term.write('\r\n\x1b[1;31m[rc] Error: ' + msg.data + '\x1b[0m\r\n');
              break;
            }
          }
        } catch (e) {
          console.error('WS parse error:', e);
        }
      };

      ws.onclose = () => {
        setStatus('disconnected', 'status-disconnected');
        dcOverlay.classList.add('visible');
      };

      ws.onerror = () => ws.close();
    }

    const IDLE_THRESHOLD = 3000; // 3 seconds of silence → "awaiting input"
    setInterval(() => {
      const now = Date.now();
      for (const t of Object.values(tabs)) {
        if (!t) continue;
        if (t.status === 'running' && now - t.lastOutputAt > IDLE_THRESHOLD) {
          t.dotEl.classList.add('awaiting');
        }
      }
    }, 1000);

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('login-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    // ───── Alt+1~9: Switch Tabs ─────
    document.addEventListener('keydown', (e) => {
      if (e.altKey && !e.ctrlKey && !e.shiftKey && !e.metaKey) {
        const n = parseInt(e.key);
        if (n >= 1 && n <= 9) {
          e.preventDefault();
          e.stopPropagation();
          // Follow DOM order (reflects drag-and-drop reorder), exclude split/removed
          const visible = [];
          tabBar.querySelectorAll('.tab-item').forEach(el => {
            const i = parseInt(el.dataset.tabIdx);
            if (tabs[i] && !tabs[i].removed && !tabs[i].split) visible.push(i);
          });
          if (n - 1 < visible.length) switchTab(visible[n - 1]);
        }
      }
    }, true);

    window.addEventListener('beforeunload', () => { if (ws) ws.close(); });

    initApp();
  </script>
</body>
</html>
